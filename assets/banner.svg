<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" width="900" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="60%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#0A1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C2FF;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00C2FF;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#0088cc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0088cc;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="60%" style="stop-color:#e0f4ff"/>
      <stop offset="100%" style="stop-color:#00C2FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="900" height="220"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="900" height="220" fill="url(#bg)"/>

    <!-- Grid lines - vertical -->
    <g stroke="#00C2FF" stroke-width="0.3" opacity="0.07">
      <line x1="100" y1="0" x2="100" y2="220"/>
      <line x1="200" y1="0" x2="200" y2="220"/>
      <line x1="300" y1="0" x2="300" y2="220"/>
      <line x1="400" y1="0" x2="400" y2="220"/>
      <line x1="500" y1="0" x2="500" y2="220"/>
      <line x1="600" y1="0" x2="600" y2="220"/>
      <line x1="700" y1="0" x2="700" y2="220"/>
      <line x1="800" y1="0" x2="800" y2="220"/>
    </g>
    <!-- Grid lines - horizontal -->
    <g stroke="#00C2FF" stroke-width="0.3" opacity="0.07">
      <line x1="0" y1="55" x2="900" y2="55"/>
      <line x1="0" y1="110" x2="900" y2="110"/>
      <line x1="0" y1="165" x2="900" y2="165"/>
    </g>

    <!-- Top-left bracket decoration -->
    <g stroke="#00C2FF" stroke-width="1.5" fill="none" opacity="0.5">
      <polyline points="30,20 16,20 16,60"/>
    </g>
    <!-- Bottom-right bracket decoration -->
    <g stroke="#00C2FF" stroke-width="1.5" fill="none" opacity="0.5">
      <polyline points="870,200 884,200 884,160"/>
    </g>

    <!-- Dot grid top-right area -->
    <g fill="#00C2FF" opacity="0.12">
      <circle cx="760" cy="28" r="1.5"/><circle cx="780" cy="28" r="1.5"/><circle cx="800" cy="28" r="1.5"/><circle cx="820" cy="28" r="1.5"/><circle cx="840" cy="28" r="1.5"/>
      <circle cx="760" cy="46" r="1.5"/><circle cx="780" cy="46" r="1.5"/><circle cx="800" cy="46" r="1.5"/><circle cx="820" cy="46" r="1.5"/><circle cx="840" cy="46" r="1.5"/>
      <circle cx="760" cy="64" r="1.5"/><circle cx="780" cy="64" r="1.5"/><circle cx="800" cy="64" r="1.5"/><circle cx="820" cy="64" r="1.5"/><circle cx="840" cy="64" r="1.5"/>
    </g>

    <!-- Dot grid bottom-left area -->
    <g fill="#00C2FF" opacity="0.12">
      <circle cx="60" cy="156" r="1.5"/><circle cx="80" cy="156" r="1.5"/><circle cx="100" cy="156" r="1.5"/>
      <circle cx="60" cy="174" r="1.5"/><circle cx="80" cy="174" r="1.5"/><circle cx="100" cy="174" r="1.5"/>
      <circle cx="60" cy="192" r="1.5"/><circle cx="80" cy="192" r="1.5"/><circle cx="100" cy="192" r="1.5"/>
    </g>

    <!-- Animated scan line -->
    <rect x="0" y="0" width="900" height="2" fill="url(#accent)" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,222" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- Cyan glow orb behind text -->
    <ellipse cx="450" cy="105" rx="200" ry="60" fill="#00C2FF" opacity="0.04" filter="url(#softglow)"/>

    <!-- Small tag top-left -->
    <text x="32" y="44" font-family="'Courier New', monospace" font-size="10" fill="#00C2FF" opacity="0.5">~/devflex-ai</text>

    <!-- Version tag top-right area -->
    <rect x="738" y="88" width="80" height="18" rx="3" fill="#00C2FF" opacity="0.1"/>
    <text x="778" y="101" font-family="'Courier New', monospace" font-size="10" fill="#00C2FF" text-anchor="middle" opacity="0.7">v2025.04</text>

    <!-- Main title -->
    <text
      x="450" y="102"
      font-family="'Arial Black', 'Impact', sans-serif"
      font-size="72"
      font-weight="900"
      fill="url(#textGrad)"
      text-anchor="middle"
      letter-spacing="-1"
      filter="url(#glow)"
    >DevFlex-AI</text>

    <!-- Underline accent -->
    <rect x="225" y="114" width="450" height="2" rx="1" fill="url(#accent)" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
    </rect>

    <!-- Subtitle -->
    <text
      x="450" y="148"
      font-family="'Courier New', monospace"
      font-size="13"
      fill="#8B949E"
      text-anchor="middle"
      letter-spacing="3"
    >SYSTEMS ENGINEER  ·  AI TOOLING  ·  OPEN SOURCE</text>

    <!-- Status indicator -->
    <circle cx="321" cy="175" r="4" fill="#00C2FF" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="332" y="179" font-family="'Courier New', monospace" font-size="11" fill="#00C2FF" opacity="0.8">building rift.sh</text>

    <!-- Right side tags -->
    <text x="560" y="179" font-family="'Courier New', monospace" font-size="11" fill="#8B949E" opacity="0.5">[ TypeScript · Rust · Python ]</text>

    <!-- Bottom line -->
    <rect x="0" y="216" width="900" height="4" fill="url(#accent)" opacity="0.4"/>
  </g>
</svg>
